services:
  - type: web
    name: personal-docs-qa-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=backend/src python -m personal_docs_qa.rag_indexing && PYTHONPATH=backend/src uvicorn personal_docs_qa.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: ALLOWED_FRONTEND_ORIGINS
        value: https://personal-docs-qa-frontend.onrender.com
  - type: web
    name: personal-docs-qa-frontend
    runtime: static
    renderSubdomainPolicy: enabled
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: checksPass
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://personal-docs-qa-api.onrender.com
